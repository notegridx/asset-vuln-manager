spring:
  config:
    activate:
      on-profile: h2

  datasource:
    url: jdbc:h2:file:~/assetvulndb;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

  h2:
    console:
      enabled: true
      path: /h2-console