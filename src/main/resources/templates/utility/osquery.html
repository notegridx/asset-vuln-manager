<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('osquery JSON Converter')}"></head>

<body th:replace="~{layout/base :: layout('osquery JSON Converter', 'operations', ~{::main})}">
<main>

  <h1>osquery JSON → assets.csv / software.csv Converter</h1>

  <p class="muted">
    Paste osquery JSON output and convert it to CSVs compatible with Asset-Vuln-Manager import.
    This tool generates both <b>assets.csv</b> and <b>software.csv</b>.
  </p>

  <div class="card" style="padding:16px; margin:12px 0;">
    <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:flex-end;">
      <div>
        <label style="display:block;">Mode</label>
        <select id="mode" onchange="onModeChange()">
          <option value="single" selected>Single host (manual external_key)</option>
          <option value="multi">Multi host (read from JSON: hostname/hostIdentifier)</option>
        </select>
      </div>

      <div>
        <label style="display:block;">Asset External Key (single-host)</label>
        <input type="text" id="externalKey" style="width:260px;" placeholder="OSAKA-DB-01">
      </div>

      <div>
        <label style="display:block;">Asset Name (optional)</label>
        <input type="text" id="assetName" style="width:260px;" placeholder="Osaka-DB-Server-01">
      </div>

      <div>
        <label style="display:block;">Asset Type (optional)</label>
        <input type="text" id="assetType" style="width:160px;" placeholder="SERVER">
      </div>
    </div>

    <div style="margin-top:12px;">
      <label style="display:block;">osquery JSON</label>
      <textarea id="jsonInput" style="width:100%; height:260px;"></textarea>
    </div>

    <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
      <button type="button" onclick="convert()">Convert</button>
      <button type="button" onclick="downloadAssets()" id="downloadAssetsBtn" disabled>Download assets.csv</button>
      <button type="button" onclick="downloadSoftware()" id="downloadSoftwareBtn" disabled>Download software.csv</button>
    </div>
  </div>

  <div class="card" style="padding:16px; margin:12px 0;">
    <div class="muted" style="font-size:12px; margin-bottom:6px;">Preview</div>
    <div style="display:grid; grid-template-columns:1fr; gap:12px;">
      <div>
        <div style="font-weight:600;">assets.csv</div>
        <pre id="assetsOut" style="white-space:pre; overflow:auto; max-height:220px;"></pre>
      </div>
      <div>
        <div style="font-weight:600;">software.csv</div>
        <pre id="softwareOut" style="white-space:pre; overflow:auto; max-height:220px;"></pre>
      </div>
    </div>
  </div>

  <script>
    let generatedAssetsCsv = "";
    let generatedSoftwareCsv = "";

    function setStatus(msg, isError=false) {
      // preview枠の上に status 用の要素を作る（無ければ）
      let el = document.getElementById("status");
      if (!el) {
        el = document.createElement("div");
        el.id = "status";
        el.style.margin = "8px 0";
        el.style.fontSize = "12px";
        el.style.padding = "8px 10px";
        el.style.borderRadius = "8px";
        el.style.border = "1px solid #ddd";
        const card = document.querySelector("main .card"); // 最初の card の末尾に差し込む
        card.appendChild(el);
      }
      el.textContent = msg || "";
      el.style.background = isError ? "#fff4f4" : "#f6f6f6";
      el.style.borderColor = isError ? "#ffb6b6" : "#ddd";
    }

    function disableDownloads() {
      document.getElementById("downloadAssetsBtn").disabled = true;
      document.getElementById("downloadSoftwareBtn").disabled = true;
    }

    function enableDownloads(hasAssets, hasSoftware) {
      document.getElementById("downloadAssetsBtn").disabled = !hasAssets;
      document.getElementById("downloadSoftwareBtn").disabled = !hasSoftware;
    }

    function onModeChange() {
      const mode = document.getElementById("mode").value;
      const disabled = (mode === "multi");
      document.getElementById("externalKey").disabled = disabled;
    }

    function sanitizeCsvField(s) {
      return String(s ?? "").replace(/[\r\n]+/g, " ").replace(/,/g, " ").trim();
    }
    function upperKey(s) {
      return String(s ?? "").trim().toUpperCase();
    }

    function getHostKeyFromItem(item) {
      const candidates = [
        item.hostname,
        item.hostIdentifier,
        item.host_identifier,
        item.host,
        item.node,
        item.asset,
        item.external_key
      ];
      for (const c of candidates) {
        if (c && String(c).trim()) return upperKey(c);
      }
      return "";
    }

    function normalizeToRecords(data) {
      if (Array.isArray(data)) {
        const looksHostWrapped = data.some(x =>
                x && typeof x === "object" &&
                (x.rows || x.results || x.data) &&
                (x.hostname || x.hostIdentifier || x.host_identifier)
        );
        if (looksHostWrapped) {
          return data.map(x => {
            const ek = getHostKeyFromItem(x);
            const rows = x.rows || x.results || x.data || [];
            return { externalKey: ek, softwareRows: Array.isArray(rows) ? rows : [] };
          }).filter(r => r.externalKey);
        }
        return [{ externalKey: "", softwareRows: data }]; // 単一ホスト
      }

      if (data && typeof data === "object") {
        const maybe = data.results || data.rows || data.data;
        if (Array.isArray(maybe)) {
          const looksHostWrapped = maybe.some(x =>
                  x && typeof x === "object" &&
                  (x.rows || x.results || x.data) &&
                  (x.hostname || x.hostIdentifier || x.host_identifier)
          );
          if (looksHostWrapped) {
            return maybe.map(x => {
              const ek = getHostKeyFromItem(x);
              const rows = x.rows || x.results || x.data || [];
              return { externalKey: ek, softwareRows: Array.isArray(rows) ? rows : [] };
            }).filter(r => r.externalKey);
          }
          return [{ externalKey: "", softwareRows: maybe }];
        }
      }
      return [];
    }

    function convert() {
      // まず状態リセット
      generatedAssetsCsv = "";
      generatedSoftwareCsv = "";
      document.getElementById("assetsOut").textContent = "";
      document.getElementById("softwareOut").textContent = "";
      disableDownloads();
      setStatus("");

      const mode = document.getElementById("mode").value;
      const externalKeyInput = upperKey(document.getElementById("externalKey").value);
      const assetNameInput = sanitizeCsvField(document.getElementById("assetName").value);
      const assetTypeInput = sanitizeCsvField(document.getElementById("assetType").value);
      const jsonText = document.getElementById("jsonInput").value;

      let data;
      try {
        data = JSON.parse(jsonText);
      } catch (e) {
        setStatus("Invalid JSON: JSON parse failed.", true);
        return;
      }

      const records = normalizeToRecords(data);
      if (records.length === 0) {
        setStatus("Unsupported JSON structure: no records found.", true);
        return;
      }

      // “配列（単一ホスト）” なのに multi を選んでいる場合はガイド
      const isSingleArray = (records.length === 1 && records[0].externalKey === "");
      if (mode === "multi" && isSingleArray) {
        setStatus("This JSON does not include hostname/hostIdentifier. Switch to 'Single host' or provide host keys in JSON.", true);
        return;
      }

      if (mode === "single" && !externalKeyInput) {
        setStatus("external_key is required in Single host mode. Fill 'Asset External Key' (e.g., OSAKA-DB-01).", true);
        return;
      }

      const assetsMap = new Map();
      const softwareLines = ["external_key,vendor,product,version,cpe_name"];

      for (const rec of records) {
        let ek = rec.externalKey;

        if (mode === "single") {
          ek = externalKeyInput;
        } else {
          if (!ek) continue;
        }

        if (!assetsMap.has(ek)) {
          const name = assetNameInput || ek;
          assetsMap.set(ek, [
            ek,
            sanitizeCsvField(name),
            assetTypeInput,
            "",
            ""
          ].join(","));
        }

        const rows = Array.isArray(rec.softwareRows) ? rec.softwareRows : [];
        for (const item of rows) {
          const product = sanitizeCsvField(item.name || item.product || "");
          if (!product) continue;

          const vendor = sanitizeCsvField(item.vendor || item.publisher || item.maintainer || "");
          const version = sanitizeCsvField(item.version || "");
          softwareLines.push([ek, vendor, product, version, ""].join(","));
        }
      }

      const assetsLines = ["external_key,name,asset_type,owner,note", ...assetsMap.values()];

      generatedAssetsCsv = assetsLines.join("\n");
      generatedSoftwareCsv = softwareLines.join("\n");

      document.getElementById("assetsOut").textContent = generatedAssetsCsv;
      document.getElementById("softwareOut").textContent = generatedSoftwareCsv;

      const hasAssets = assetsMap.size > 0;
      const hasSoftware = softwareLines.length > 1;

      enableDownloads(hasAssets, hasSoftware);

      setStatus(`Converted: assets=${assetsMap.size} row(s), software=${softwareLines.length - 1} row(s).`);
    }

    function downloadBlob(text, filename) {
      const blob = new Blob([text], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function downloadAssets() {
      if (!generatedAssetsCsv) return;
      downloadBlob(generatedAssetsCsv, "assets.csv");
    }

    function downloadSoftware() {
      if (!generatedSoftwareCsv) return;
      downloadBlob(generatedSoftwareCsv, "software.csv");
    }

    onModeChange();
  </script>

</main>
</body>
</html>
