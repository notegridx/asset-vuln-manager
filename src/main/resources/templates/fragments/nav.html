<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="nav(active)">
    <div class="nav-wrap" style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">

        <!-- Primary -->
        <a class="nav-link"
           th:classappend="${active == 'dashboard'} ? ' active' : ''"
           th:href="@{/dashboard}">Dashboard</a>

        <!-- Assets dropdown -->
        <details class="nav-admin" th:classappend="${active == 'assets'} ? ' is-active' : ''">

            <summary class="nav-link nav-admin__trigger"
                     th:classappend="${active == 'assets'} ? ' active' : ''">
                Assets
                <span class="nav-admin__chev" aria-hidden="true">▾</span>
            </summary>

            <div class="nav-admin-menu" role="menu" aria-label="Assets menu">

                <div class="nav-admin-section">
                    <div class="nav-admin-section__title">Inventory</div>

                    <a class="nav-admin-item"
                       role="menuitem"
                       th:href="@{/assets}">
                        Asset List
                    </a>

                    <a class="nav-admin-item"
                       role="menuitem"
                       th:href="@{/software}">
                        Installed Software
                    </a>
                </div>

            </div>
        </details>

        <a class="nav-link"
           th:classappend="${active == 'vulns'} ? ' active' : ''"
           th:href="@{/vulnerabilities}">Vulnerabilities</a>

        <a class="nav-link"
           th:classappend="${active == 'alerts'} ? ' active' : ''"
           th:href="@{/alerts}">Alerts</a>

        <!-- Operations dropdown -->
        <details class="nav-admin" th:classappend="${active == 'admin'} ? ' is-active' : ''">
            <summary class="nav-link nav-admin__trigger" th:classappend="${active == 'admin'} ? ' active' : ''">
                Operations
                <span class="nav-admin__chev" aria-hidden="true">▾</span>
            </summary>

            <div class="nav-admin-menu" role="menu" aria-label="Operations menu">
                <div class="nav-admin-section">
                    <div class="nav-admin-section__title">Data Updates</div>
                    <a class="nav-admin-item" role="menuitem" th:href="@{/admin/cpe/sync}">Update Product Dictionary</a>
                    <a class="nav-admin-item" role="menuitem" th:href="@{/admin/cve/sync}">Update Vulnerability Data</a>
                    <a class="nav-admin-item is-muted" role="menuitem" th:href="@{/admin/sync}">CVE Delta Update (API)</a>
                </div>

                <div class="nav-admin-divider" role="separator"></div>

                <div class="nav-admin-section">
                    <div class="nav-admin-section__title">Inventory</div>
                    <a class="nav-admin-item" role="menuitem" th:href="@{/admin/import/csv}">CSV Import</a>
                    <a class="nav-admin-item" role="menuitem" th:href="@{/admin/import/json}">JSON Import</a>
                    <a class="nav-admin-item" role="menuitem" th:href="@{/admin/import-runs}">Import Runs</a>
                    <a class="nav-admin-item" role="menuitem" th:href="@{/admin/unresolved}">Unresolved Mappings</a>
                    <a class="nav-admin-item" role="menuitem" th:href="@{/admin/canonical}">Review Product Mapping</a>
                </div>

                <div class="nav-admin-divider" role="separator"></div>

                <div class="nav-admin-section">
                    <div class="nav-admin-section__title">Matching</div>
                    <a class="nav-admin-item" role="menuitem" th:href="@{/admin/alerts/recalculate}">Generate Alerts</a>
                </div>
            </div>
        </details>

    </div>
</nav>

</body>
</html>
