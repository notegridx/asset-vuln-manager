<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('Alerts by Software')}"></head>
<body th:replace="~{layout/base :: layout('Alerts by Software', 'alerts', ~{::main})}">
<main>

  <div class="page-header flex items-end justify-between gap-16 flex-wrap">
    <div>
      <h1>Alerts (Grouped by Software)</h1>
      <div class="muted mt-6">
        One row per SoftwareInstall. Drill down to see the raw rows.
      </div>
    </div>

    <div class="flex gap-10 items-center flex-wrap">
      <span class="pill" th:text="'status: ' + ${status}"></span>
      <span class="pill" th:text="'certainty: ' + ${certainty != null ? certainty : 'ALL'}"></span>
      <span class="pill" th:text="'severity: ' + ${severity != null ? severity : 'ALL'}">severity: ALL</span>
      <span class="pill" th:text="'rows: ' + ${#lists.size(rows)}"></span>
      <span class="pill">view: SOFTWARE</span>
    </div>
  </div>

  <!-- Controls -->
  <div th:replace="~{fragments/alerts_filters :: filters(${status}, ${certainty}, ${severity}, 'SOFTWARE', ${assetId}, ${softwareId})}"></div>

  <!-- Table -->
  <div class="table-wrap">
    <table class="table m-0">
      <thead>
      <tr>
        <th>Asset</th>
        <th>Software</th>
        <th class="col-120">Alerts</th>
        <th class="col-160">Top Severity</th>
        <th>Breakdown</th>
        <th class="col-190">Last Seen</th>
        <th class="col-170">Actions</th>
      </tr>
      </thead>

      <tbody>
      <tr th:if="${#lists.isEmpty(rows)}">
        <td colspan="7" class="muted cell-empty">
          No grouped rows found for the selected status.
        </td>
      </tr>

      <tr th:each="r : ${rows}">
        <td>
          <div><b th:text="${r.assetName}"></b></div>
          <div class="muted text-12" th:text="'assetId: ' + ${r.assetId}"></div>
        </td>

        <td>
          <div>
            <b th:text="${r.product}"></b>
            <span class="muted"
                  th:text="${r.version != null && !r.version.isBlank() ? ' ' + r.version : ''}"></span>
          </div>
          <div class="muted text-12"
               th:text="${(r.vendor != null ? r.vendor : '') + ' / installId: ' + r.softwareInstallId}">
          </div>
        </td>

        <td th:text="${r.totalAlerts}"></td>

        <td>
        <span class="badge"
              th:classappend="${r.topSeverity != null
                    ? (r.topSeverity.toString() == 'CRITICAL' ? ' badge--sev-critical'
                    : (r.topSeverity.toString() == 'HIGH' ? ' badge--sev-high'
                    : (r.topSeverity.toString() == 'MEDIUM' ? ' badge--sev-medium'
                    : (r.topSeverity.toString() == 'LOW' ? ' badge--sev-low'
                    : ' badge--sev-none'))))
                    : ' badge--sev-none'}"
              th:text="${r.topSeverity != null ? r.topSeverity : 'NONE'}"></span>
        </td>

        <td class="muted text-12">
          CRIT <span th:text="${r.critical}"></span>
          / HIGH <span th:text="${r.high}"></span>
          / MED <span th:text="${r.medium}"></span>
          / LOW <span th:text="${r.low}"></span>
          / NONE <span th:text="${r.none}"></span>
        </td>

        <td th:text="${T(dev.notegridx.security.assetvulnmanager.utility.UiDateTime).shortFormat(r.lastSeenAt)}">-</td>

        <td>
          <a class="btn btn-ghost btn-sm"
             th:href="@{/alerts(view='FLAT', status=${status}, certainty=${certainty},  severity=${severity}, softwareId=${r.softwareInstallId})}">
            Drilldown
          </a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

</main>
</body>
</html>
