<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Software</title>
</head>
<body>
  <p><a th:href="@{/assets/{id}(id=${asset.id})}">Back</a></p>
  
  <h1>Add Software</h1>
  <div>
    <b>Asset:</b> <span th:text="${asset.name}">AssetName</span>
    (ID: <span th:text="${asset.id}">1</span>)
  </div>
  
  <form th:action="@{/assets/{id}/software(id=${asset.id})}" th:object="${softwareInstallForm}" method="post">
    <div>
      <label>Vendor</label>
      <input type="text" th:field="*{vendor}"/>
    </div>
    
    <div>
      <label>Product *</label>
      <input type="text" th:field="*{product}"/>
      <div th:if="${#fields.hasErrors('product')}" th:errors="*{product}">Product error</div>
    </div>
    
    <div>
      <label>Version</label>
      <input type="text" th:field="*{version}"/>
    </div>
    
    <div>
      <label>CPE</label>
      <input type="text" th:field="*{cpeName}" placeholder="cpe:2.3:... (optional)"/>
    </div>
    
    <div>
      <button type="submit">Create</button>
    </div>
    
  </form>

</body>
</html>
