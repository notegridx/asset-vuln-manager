<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Create Asset</title>
</head>
<body>
  <h1>Create Asset</h1>
  
  <form th:action="@{/assets}" th:object="${assetForm}" method="post">
    <div>
      <label>Name *</label>
      <input type="text" th:field="*{name}" />
      <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</div>
    </div>
    
    <div>
      <label>Asset Type</label>
      <input type="text" th:field="*{assetType}" />
    </div>
    <div>
      <label>Owner</label>
      <input type="text" th:field="*{owner}" />
    </div>
    <div>
      <label>Note</label>
      <textarea th:field="*{note}"></textarea>
    </div>
    
    <div>
      <button type="submit">Create</button>
      <a th:href="@{/assets}">Back</a>
    </div>
  </form>

</body>
</html>
