<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Create Asset')}"></head>

<body th:replace="~{layout/base :: layout('Create Asset', 'assets', ~{::main})}">
<main>
    <h1>Create Asset</h1>

    <form th:action="@{/assets}" th:object="${assetForm}" method="post">

        <div th:if="${#fields.hasGlobalErrors()}" class="card" style="padding:12px; margin-bottom:14px;">
            <div class="error" th:each="err : ${#fields.globalErrors()}" th:text="${err}">
                Global error
            </div>
        </div>

        <div class="field">
            <label>External Key</label>
            <input type="text"
                   th:field="*{externalKey}"
                   placeholder="e.g. ASSET-001">

            <div class="error"
                 th:if="${#fields.hasErrors('externalKey')}"
                 th:errors="*{externalKey}">
                External Key error
            </div>
        </div>

        <div class="field">
            <label>Name *</label>
            <input type="text" th:field="*{name}"/>
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</div>
        </div>

        <div class="field">
            <label>Asset Type</label>
            <input type="text" th:field="*{assetType}"/>
        </div>

        <div class="field">
            <label>Owner</label>
            <input type="text" th:field="*{owner}"/>
        </div>

        <div class="field">
            <label>Note</label>
            <textarea th:field="*{note}"></textarea>
        </div>

        <div class="field">
            <label>Source</label>
            <input type="text" th:field="*{source}" placeholder="e.g. MANUAL / OSQUERY / FLEET"/>
        </div>

        <div class="field">
            <label>Platform</label>
            <input type="text" th:field="*{platform}" placeholder="e.g. Windows / Linux / macOS"/>
        </div>

        <div class="field">
            <label>OS Version</label>
            <input type="text" th:field="*{osVersion}" placeholder="e.g. 11.0.22631"/>
        </div>

        <hr style="margin:20px 0; border:none; border-top:1px solid rgba(255,255,255,0.08);">

        <div class="field">
            <label>System UUID</label>
            <input type="text" th:field="*{systemUuid}"/>
        </div>

        <div class="field">
            <label>Serial Number</label>
            <input type="text" th:field="*{serialNumber}"/>
        </div>

        <div class="field">
            <label>Hardware Vendor</label>
            <input type="text" th:field="*{hardwareVendor}"/>
        </div>

        <div class="field">
            <label>Hardware Model</label>
            <input type="text" th:field="*{hardwareModel}"/>
        </div>

        <div class="field">
            <label>Hardware Version</label>
            <input type="text" th:field="*{hardwareVersion}"/>
        </div>

        <div class="field">
            <label>Computer Name</label>
            <input type="text" th:field="*{computerName}"/>
        </div>

        <div class="field">
            <label>Local Hostname</label>
            <input type="text" th:field="*{localHostname}"/>
        </div>

        <div class="field">
            <label>Hostname</label>
            <input type="text" th:field="*{hostname}"/>
        </div>

        <hr style="margin:20px 0; border:none; border-top:1px solid rgba(255,255,255,0.08);">

        <div class="field">
            <label>CPU Brand</label>
            <input type="text" th:field="*{cpuBrand}"/>
        </div>

        <div class="field">
            <label>CPU Physical Cores</label>
            <input type="number" th:field="*{cpuPhysicalCores}"/>
        </div>

        <div class="field">
            <label>CPU Logical Cores</label>
            <input type="number" th:field="*{cpuLogicalCores}"/>
        </div>

        <div class="field">
            <label>CPU Sockets</label>
            <input type="number" th:field="*{cpuSockets}"/>
        </div>

        <div class="field">
            <label>Physical Memory</label>
            <input type="number" th:field="*{physicalMemory}"/>
        </div>

        <div class="field">
            <label>Architecture</label>
            <input type="text" th:field="*{arch}"/>
        </div>

        <hr style="margin:20px 0; border:none; border-top:1px solid rgba(255,255,255,0.08);">

        <div class="field">
            <label>Board Vendor</label>
            <input type="text" th:field="*{boardVendor}"/>
        </div>

        <div class="field">
            <label>Board Model</label>
            <input type="text" th:field="*{boardModel}"/>
        </div>

        <div class="field">
            <label>Board Version</label>
            <input type="text" th:field="*{boardVersion}"/>
        </div>

        <div class="field">
            <label>Board Serial</label>
            <input type="text" th:field="*{boardSerial}"/>
        </div>

        <hr style="margin:20px 0; border:none; border-top:1px solid rgba(255,255,255,0.08);">

        <div class="field">
            <label>OS Name</label>
            <input type="text" th:field="*{osName}"/>
        </div>

        <div class="field">
            <label>OS Build</label>
            <input type="text" th:field="*{osBuild}"/>
        </div>

        <div class="field">
            <label>OS Major</label>
            <input type="number" th:field="*{osMajor}"/>
        </div>

        <div class="field">
            <label>OS Minor</label>
            <input type="number" th:field="*{osMinor}"/>
        </div>

        <div class="field">
            <label>OS Patch</label>
            <input type="number" th:field="*{osPatch}"/>
        </div>

        <div class="actions" style="margin-top: 14px;">
            <a th:href="@{/assets}">Back</a>
            <button type="submit">Create</button>
        </div>
    </form>
</main>
</body>
</html>
