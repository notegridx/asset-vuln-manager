<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Assets</title>
</head>

<body>
  <h1>Assets</h1>

  <p><a th:href="@{/assets/new}">Create new</a></p>

  <table border="1" cellpadding="6">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="a : ${assets}">
      <td th:text="${a.id}">1</td>
      <td th:text="${a.name}">Example</td>
    </tr>
  </tbody>
  </table>
</body>

</html>
