<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('Asset Detail')}"></head>

<body th:replace="~{layout/base :: layout('Asset Detail', 'assets', ~{::main})}">
  <main>
    <div class="actions">
      <h1 style="margin:0;">Asset Detail</h1>
      <a th:href="@{/assets}"><- Back to list</a>
    </div>

    <div class="kv">
      <b>ID</b> <span th:text="${asset.id}">1</span>
      <b>Name</b> <span th:text="${asset.name}">Example</span>
    </div>

    <hr />

    <div class="actions">
      <h2 style="margin:0;">Software Installs</h2>
      <a th:href="@{/assets/{id}/software/new(id=${asset.id})}">+ Add software</a>

    </div>

    <table>
      <thead>
        <tr>
          <th style="width: 80px;">ID</th>
          <th style="width: 160px;">Vendor</th>
          <th style="width: 220px;">Product</th>
          <th style="width: 120px;">Version</th>
          <th>CPE</th>
          <th style="width: 90px;">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(installs)}">
          <td colspan="6" class="muted">No software installs</td>
        </tr>
        <tr th:each="s : ${installs}">
          <td th:text="${s.id}">1</td>
          <td th:text="${s.vendor}">vendor</td>
          <td th:text="${s.product}">product</td>
          <td th:text="${s.version}">1.0</td>
          <td th:text="${s.cpeName}">cpe:2.3:...</td>
          <td>
            <a th:href="@{/software/{id}/edit(id=${s.id})}">Edit</a>
          </td>
        </tr>
      </tbody>
    </table>


  </main>
</body>

</html>
