<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('CVEs')}"></head>

<body th:replace="~{layout/base :: layout('CVEs', 'vulns', ~{::main})}">
<main>

    <div class="actions">
        <h1 style="margin: 0;">CVEs</h1>
        <a class="btn" th:href="@{/vulnerabilities}">Clear</a>
    </div>

    <form method="get" th:action="@{/vulnerabilities}" class="card" style="padding:12px; margin:12px 0;">
        <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end;">

            <div class="field" style="min-width: 160px;">
                <label>Sort</label>
                <select name="sort">
                    <option value="LAST_MODIFIED" th:selected="${sort == 'LAST_MODIFIED'}">Last Modified</option>
                    <option value="CVSS" th:selected="${sort == 'CVSS'}">CVSS (desc)</option>
                    <option value="SEVERITY" th:selected="${sort == 'SEVERITY'}">Severity</option>
                </select>
            </div>

            <div class="field" style="min-width: 160px;">
                <label>Severity</label>
                <select name="severity">
                    <option value="" th:selected="${severity == ''}">All</option>
                    <option value="CRITICAL" th:selected="${severity == 'CRITICAL'}">CRITICAL</option>
                    <option value="HIGH" th:selected="${severity == 'HIGH'}">HIGH</option>
                    <option value="MEDIUM" th:selected="${severity == 'MEDIUM'}">MEDIUM</option>
                    <option value="LOW" th:selected="${severity == 'LOW'}">LOW</option>
                    <option value="NONE" th:selected="${severity == 'NONE'}">NONE</option>
                </select>
            </div>

            <div class="field" style="min-width: 130px;">
                <label>Min CVSS</label>
                <input type="number" name="minCvss" step="0.1" min="0" max="10" th:value="${minCvss}">
            </div>

            <div class="field" style="min-width: 130px;">
                <label>Max CVSS</label>
                <input type="number" name="maxCvss" step="0.1" min="0" max="10" th:value="${maxCvss}">
            </div>

            <div class="field" style="min-width: 160px;">
                <label>Page size</label>
                <select name="size">
                    <option value="25" th:selected="${size == 25}">25</option>
                    <option value="50" th:selected="${size == 50}">50</option>
                    <option value="100" th:selected="${size == 100}">100</option>
                    <option value="200" th:selected="${size == 200}">200</option>
                    <option value="500" th:selected="${size == 500}">500</option>
                </select>
            </div>

            <!-- ★ includeNoCvss: select (true/false を必ず送る) -->
            <div class="field" style="min-width: 190px;">
                <label>No CVSS rows</label>
                <select name="includeNoCvss">
                    <option value="true" th:selected="${includeNoCvss}">Include</option>
                    <option value="false" th:selected="${!includeNoCvss}">Exclude</option>
                </select>
            </div>

            <!-- ★ withCpe/withRange: checkbox only (hidden無し) -->
            <div class="field" style="display:flex; gap:16px; align-items:center; padding-bottom:6px;">
                <label style="display:flex; gap:8px; align-items:center; margin:0;">
                    <input type="checkbox" name="withCpe" value="true" th:checked="${withCpe}">
                    With CPE
                </label>

                <label style="display:flex; gap:8px; align-items:center; margin:0;">
                    <input type="checkbox" name="withRange" value="true" th:checked="${withRange}">
                    With version range
                </label>
            </div>

            <div class="actions" style="margin-left:auto; gap:10px;">
                <input type="hidden" name="page" value="0">
                <button type="submit">Apply</button>
            </div>

        </div>
    </form>

    <div class="muted" style="margin: 8px 0;">
        <span th:text="'Total: ' + ${vulns.totalElements} + ' / Pages: ' + ${vulns.totalPages}">Total</span>
    </div>

    <div class="card" style="padding:0; overflow:auto;">
        <table class="table">
            <thead>
            <tr>
                <th style="min-width:140px;">CVE</th>
                <th style="min-width:110px;">Severity</th>
                <th style="min-width:120px;">CVSS</th>
                <th>Title</th>
                <th style="min-width:170px;">Last Modified</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${vulns.totalElements == 0}">
                <td colspan="5" class="muted" style="padding:14px;">No results.</td>
            </tr>

            <tr th:each="v : ${vulns.content}">
                <td>
                    <!-- ★ detail mapping に合わせる -->
                    <a th:href="@{/vulnerabilities/{id}(id=${v.id})}" th:text="${v.externalId}">CVE-XXXX</a>
                </td>
                <td>
          <span class="badge"
                th:classappend="${v.severity != null
                  ? (v.severity.toString() == 'CRITICAL'
                      ? ' badge--sev-critical'
                      : (v.severity.toString() == 'HIGH'
                          ? ' badge--sev-high'
                          : (v.severity.toString() == 'MEDIUM'
                              ? ' badge--sev-medium'
                              : (v.severity.toString() == 'LOW'
                                  ? ' badge--sev-low'
                                  : ' badge--sev-none'))))
                  : ' badge--sev-none'}"
                th:text="${v.severity != null ? v.severity : 'NONE'}">HIGH</span>
                </td>
                <td class="muted"
                    th:text="${(v.cvssVersion != null ? v.cvssVersion : '-') + ' / ' + (v.cvssScore != null ? v.cvssScore : '-')}">
                    3.1 / 7.5
                </td>
                <td>
                    <div th:text="${v.title != null ? v.title : '-'}">title</div>
                </td>
                <td class="muted" th:text="${v.lastModifiedAt != null ? v.lastModifiedAt : '-'}">-</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card" style="padding:12px; margin-top:12px;" th:if="${vulns.totalPages > 1}">
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">

            <a class="btn"
               th:if="${vulns.hasPrevious()}"
               th:href="@{/vulnerabilities(
            page=${vulns.number - 1},
            size=${size},
            sort=${sort},
            severity=${severity},
            minCvss=${minCvss},
            maxCvss=${maxCvss},
            includeNoCvss=${includeNoCvss},
            withCpe=${withCpe},
            withRange=${withRange}
         )}">Prev</a>

            <span th:each="p : ${pagerItems}" style="display:inline-flex; gap:6px; align-items:center;">
        <a class="btn"
           th:classappend="${p == vulns.number} ? ' active' : ''"
           th:href="@{/vulnerabilities(
              page=${p},
              size=${size},
              sort=${sort},
              severity=${severity},
              minCvss=${minCvss},
              maxCvss=${maxCvss},
              includeNoCvss=${includeNoCvss},
              withCpe=${withCpe},
              withRange=${withRange}
           )}"
           th:text="${p + 1}">1</a>
      </span>

            <a class="btn"
               th:if="${vulns.hasNext()}"
               th:href="@{/vulnerabilities(
            page=${vulns.number + 1},
            size=${size},
            sort=${sort},
            severity=${severity},
            minCvss=${minCvss},
            maxCvss=${maxCvss},
            includeNoCvss=${includeNoCvss},
            withCpe=${withCpe},
            withRange=${withRange}
         )}">Next</a>

            <span class="muted" style="margin-left:auto;"
                  th:text="'Page ' + ${vulns.number + 1} + ' / ' + ${vulns.totalPages}">
        Page 1 / 10
      </span>
        </div>
    </div>

</main>
</body>
</html>
