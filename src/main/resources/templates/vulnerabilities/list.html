<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('Vulnerabilities')}"></head>

<style>
    .vuln-card {
        padding: 12px;
        margin: 12px 0;
    }

    .vuln-help {
        font-size: 12px;
    }

    .vuln-filter-form {
        margin-top: 12px;
    }

    .vuln-filter-stack {
        display: grid;
        gap: 12px;
    }

    .vuln-filter-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        align-items: center;
    }

    .vuln-filter-pair {
        display: grid;
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 8px;
        align-items: center;
        min-width: 0;
    }

    .vuln-filter-pair label {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
    }

    .vuln-filter-pair input,
    .vuln-filter-pair select {
        min-width: 0;
        width: 100%;
    }

    .vuln-filter-row--flags {
        grid-template-columns: 190px minmax(0, 1fr);
    }

    .vuln-flags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 18px;
        align-items: center;
        min-height: 42px;
    }

    .vuln-flags .check-label {
        margin: 0;
        white-space: nowrap;
        font-size: 13px;
    }

    .vuln-total {
        margin-top: 8px;
        margin-bottom: 8px;
        font-size: 12px;
    }

    @media (max-width: 1180px) {
        .vuln-filter-row {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .vuln-filter-row--flags {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 760px) {
        .vuln-filter-row {
            grid-template-columns: 1fr;
        }

        .vuln-filter-pair {
            grid-template-columns: 92px minmax(0, 1fr);
        }
    }
</style>

<body th:replace="~{layout/base :: layout('Vulnerabilities', 'vulns', ~{::main})}">
<main>

    <div class="actions">
        <h1 class="m-0">Vulnerabilities</h1>
        <a class="btn" th:href="@{/vulnerabilities}">Clear</a>
    </div>

    <div class="card vuln-card">
        <div class="actions" style="margin:0; align-items:flex-end;">
            <h2 style="margin:0;">Filters</h2>
            <div class="muted vuln-help">
                Search applies after typing. Date/select fields apply on change. CVSS fields apply on blur.
            </div>
        </div>

        <form id="vulnFilterForm"
              method="get"
              th:action="@{/vulnerabilities}"
              class="vuln-filter-form">
            <input type="hidden" name="page" value="0">

            <div class="vuln-filter-stack">
                <div class="vuln-filter-row">
                    <div class="vuln-filter-pair">
                        <label for="q">Search</label>
                        <input id="q"
                               type="text"
                               name="q"
                               placeholder="CVE / CPE"
                               th:value="${q}"
                               data-auto-submit="search">
                    </div>

                    <div class="vuln-filter-pair">
                        <label for="vendor">Vendor</label>
                        <input id="vendor"
                               type="text"
                               name="vendor"
                               placeholder="e.g. microsoft"
                               th:value="${vendor}"
                               data-auto-submit="search">
                    </div>

                    <div class="vuln-filter-pair">
                        <label for="product">Product</label>
                        <input id="product"
                               type="text"
                               name="product"
                               placeholder="e.g. edge"
                               th:value="${product}"
                               data-auto-submit="search">
                    </div>

                    <div class="vuln-filter-pair">
                        <label for="sort">Sort</label>
                        <select id="sort" name="sort" data-auto-submit="change">
                            <option value="LAST_MODIFIED" th:selected="${sort == 'LAST_MODIFIED'}">Last Modified</option>
                            <option value="CVSS" th:selected="${sort == 'CVSS'}">CVSS (desc)</option>
                            <option value="SEVERITY" th:selected="${sort == 'SEVERITY'}">Severity</option>
                        </select>
                    </div>
                </div>

                <div class="vuln-filter-row">
                    <div class="vuln-filter-pair">
                        <label for="publishedFrom">Pub From</label>
                        <input id="publishedFrom"
                               type="date"
                               name="publishedFrom"
                               th:value="${publishedFrom}"
                               data-auto-submit="change">
                    </div>

                    <div class="vuln-filter-pair">
                        <label for="publishedTo">Pub To</label>
                        <input id="publishedTo"
                               type="date"
                               name="publishedTo"
                               th:value="${publishedTo}"
                               data-auto-submit="change">
                    </div>

                    <div class="vuln-filter-pair">
                        <label for="lastModifiedFrom">Mod From</label>
                        <input id="lastModifiedFrom"
                               type="date"
                               name="lastModifiedFrom"
                               th:value="${lastModifiedFrom}"
                               data-auto-submit="change">
                    </div>

                    <div class="vuln-filter-pair">
                        <label for="lastModifiedTo">Mod To</label>
                        <input id="lastModifiedTo"
                               type="date"
                               name="lastModifiedTo"
                               th:value="${lastModifiedTo}"
                               data-auto-submit="change">
                    </div>
                </div>

                <div class="vuln-filter-row">
                    <div class="vuln-filter-pair">
                        <label for="severity">Severity</label>
                        <select id="severity" name="severity" data-auto-submit="change">
                            <option value="" th:selected="${severity == ''}">All</option>
                            <option value="CRITICAL" th:selected="${severity == 'CRITICAL'}">CRITICAL</option>
                            <option value="HIGH" th:selected="${severity == 'HIGH'}">HIGH</option>
                            <option value="MEDIUM" th:selected="${severity == 'MEDIUM'}">MEDIUM</option>
                            <option value="LOW" th:selected="${severity == 'LOW'}">LOW</option>
                            <option value="NONE" th:selected="${severity == 'NONE'}">NONE</option>
                        </select>
                    </div>

                    <div class="vuln-filter-pair">
                        <label for="minCvss">Min CVSS</label>
                        <input id="minCvss"
                               type="number"
                               name="minCvss"
                               step="0.1"
                               min="0"
                               max="10"
                               th:value="${minCvss}"
                               data-auto-submit="blur">
                    </div>

                    <div class="vuln-filter-pair">
                        <label for="maxCvss">Max CVSS</label>
                        <input id="maxCvss"
                               type="number"
                               name="maxCvss"
                               step="0.1"
                               min="0"
                               max="10"
                               th:value="${maxCvss}"
                               data-auto-submit="blur">
                    </div>

                    <div class="vuln-filter-pair">
                        <label for="size">Page size</label>
                        <select id="size" name="size" data-auto-submit="change">
                            <option value="25" th:selected="${size == 25}">25</option>
                            <option value="50" th:selected="${size == 50}">50</option>
                            <option value="100" th:selected="${size == 100}">100</option>
                            <option value="200" th:selected="${size == 200}">200</option>
                            <option value="500" th:selected="${size == 500}">500</option>
                        </select>
                    </div>
                </div>

                <div class="vuln-filter-row vuln-filter-row--flags">
                    <div class="vuln-filter-pair">
                        <label for="includeNoCvss">No CVSS</label>
                        <select id="includeNoCvss" name="includeNoCvss" data-auto-submit="change">
                            <option value="true" th:selected="${includeNoCvss}">Include</option>
                            <option value="false" th:selected="${!includeNoCvss}">Exclude</option>
                        </select>
                    </div>

                    <div class="vuln-flags">
                        <label class="check-label">
                            <input type="checkbox" name="withCpe" value="true" th:checked="${withCpe}" data-auto-submit="change">
                            With CPE
                        </label>

                        <label class="check-label">
                            <input type="checkbox" name="withRange" value="true" th:checked="${withRange}" data-auto-submit="change">
                            With version range
                        </label>

                        <label class="check-label">
                            <input type="checkbox" name="kevOnly" value="true" th:checked="${kevOnly}" data-auto-submit="change">
                            KEV only
                        </label>

                        <label class="check-label">
                            <input type="checkbox" name="hasAlerts" value="true" th:checked="${hasAlerts}" data-auto-submit="change">
                            Has alerts
                        </label>

                        <label class="check-label">
                            <input type="checkbox" name="openOnly" value="true" th:checked="${openOnly}" data-auto-submit="change">
                            Open only
                        </label>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <div class="muted vuln-total">
        <span th:text="'Total: ' + ${vulns.totalElements} + ' / Pages: ' + ${vulns.totalPages}">Total</span>
    </div>

    <div class="card p-0 overflow-auto">
        <table class="table" style="table-layout:fixed; width:100%;">
            <thead>
            <tr>
                <th style="width:14%;">CVE</th>
                <th style="width:9%;">Severity</th>
                <th style="width:7%;">CVSS</th>
                <th style="width:38%;">Description</th>
                <th style="width:12%;">KEV</th>
                <th style="width:13%;">Last Modified</th>
                <th style="width:7%;">Open</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${vulns.totalElements == 0}">
                <td colspan="7" class="muted cell-empty">No results.</td>
            </tr>

            <tr th:each="v : ${vulns.content}">
                <td>
                    <a th:href="@{/vulnerabilities/{id}(id=${v.id})}"
                       th:text="${v.externalId}">CVE-XXXX</a>
                </td>

                <td>
                    <span class="badge"
                          th:classappend="' badge--sev-' + ${v.severity != null ? v.severity.toString().toLowerCase() : 'none'}"
                          th:text="${v.severity != null ? v.severity : 'NONE'}">
                    </span>
                </td>

                <td class="muted"
                    th:text="${(v.cvssVersion != null ? v.cvssVersion : '-') + ' / ' + (v.cvssScore != null ? v.cvssScore : '-')}">
                </td>

                <td>
                    <div class="muted vuln-desc line-clamp-2"
                         th:text="${v.description != null ? v.description : '-'}"></div>
                </td>

                <td>
                    <span th:if="${v.kevFlag}"
                          class="badge"
                          title=""
                          th:attr="title=${'Added: ' + (v.kevDateAdded != null ? #temporals.format(v.kevDateAdded,'yyyy-MM-dd') : '-') +
                          ' / Due: ' + (v.kevDueDate != null ? #temporals.format(v.kevDueDate,'yyyy-MM-dd') : '-') +
                          ' / Ransomware: ' + (v.kevRansomwareUse != null ? v.kevRansomwareUse : '-') }"
                          style="background: var(--warn); color: #111;">
                        KEV
                    </span>
                    <span th:unless="${v.kevFlag}" class="muted">-</span>
                    <div th:if="${v.kevFlag}" class="muted" style="font-size:12px; margin-top:2px;">
                        <span th:text="${v.kevDueDate != null ? 'Due ' + #temporals.format(v.kevDueDate,'yyyy-MM-dd') : ''}"></span>
                    </div>
                </td>

                <td class="muted"
                    th:text="${v.lastModifiedAt != null ? #temporals.format(v.lastModifiedAt, 'yyyy-MM-dd HH:mm') : '-'}">
                    -
                </td>

                <td class="muted"
                    th:text="${openAlertCountByVulnId != null ? (openAlertCountByVulnId.get(v.id) != null ? openAlertCountByVulnId.get(v.id) : 0) : 0}">
                    0
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('vulnFilterForm');
            if (!form) return;

            const pageInput = form.querySelector('input[name="page"]');
            let searchTimer = null;

            function submitForm() {
                if (pageInput) {
                    pageInput.value = '0';
                }
                form.submit();
            }

            form.querySelectorAll('[data-auto-submit="change"]').forEach(function (el) {
                el.addEventListener('change', submitForm);
            });

            form.querySelectorAll('[data-auto-submit="blur"]').forEach(function (el) {
                el.addEventListener('blur', submitForm);
                el.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        submitForm();
                    }
                });
            });

            form.querySelectorAll('[data-auto-submit="search"]').forEach(function (el) {
                el.addEventListener('input', function () {
                    clearTimeout(searchTimer);
                    searchTimer = setTimeout(submitForm, 500);
                });

                el.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        clearTimeout(searchTimer);
                        submitForm();
                    }
                });
            });
        });
    </script>

</main>
</body>
</html>
