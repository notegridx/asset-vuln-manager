<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="container" style="max-width:520px; padding-top:48px;">
    <main>
        <div class="page">
            <div class="page-header">
                <div class="page-title">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span class="brand-mark" aria-hidden="true" style="display:inline-flex; align-items:center; justify-content:center; color:var(--accent, #7aa2ff);">
                            <svg viewBox="0 0 24 24" class="brand-icon" style="width:20px; height:20px; display:block;">
                                <circle cx="6" cy="6" r="2" />
                                <circle cx="18" cy="6" r="2" />
                                <circle cx="12" cy="18" r="2" />
                                <line x1="6" y1="6" x2="18" y2="6" />
                                <line x1="6" y1="6" x2="12" y2="18" />
                                <line x1="18" y1="6" x2="12" y2="18" />
                            </svg>
                        </span>
                        <h1 style="margin:0;">Login</h1>
                    </div>
                    <div class="sub muted">asset-vuln-manager</div>
                </div>
            </div>

            <div class="card" style="padding:16px;">
                <div th:if="${param.error != null and param.reason != null and #strings.equals(param.reason[0], 'locked')}"
                     class="badge badge--danger"
                     style="margin-bottom:12px;">
                    Your account is locked. Contact an administrator to unlock it.
                </div>

                <div th:if="${param.error != null and param.reason != null and #strings.equals(param.reason[0], 'disabled')}"
                     class="badge badge--danger"
                     style="margin-bottom:12px;">
                    Your account is disabled. Contact an administrator.
                </div>

                <div th:if="${param.error != null and (param.reason == null or (!#strings.equals(param.reason[0], 'locked') and !#strings.equals(param.reason[0], 'disabled')))}"
                     class="badge badge--danger"
                     style="margin-bottom:12px;">
                    Invalid username or password.
                </div>

                <div th:if="${param.logout != null}" class="badge badge--ok" style="margin-bottom:12px;">
                    Logged out.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="field">
                        <label for="username">Username</label>
                        <input id="username" name="username" type="text" autocomplete="username" required>
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required>
                    </div>

                    <div class="actions" style="margin-top:14px;">
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>
                </form>
            </div>
            <p class="sub muted" style="margin:8px 0 0 0;">
                Sign in to manage assets, software, and vulnerabilities.
            </p>
        </div>
    </main>
</div>
</body>
</html>
