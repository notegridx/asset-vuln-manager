<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Synonyms - Products')}"></head>

<body th:replace="~{layout/base :: layout('Synonyms - Products', 'admin', ~{::main})}">
<main>

  <h1>Synonyms (Product)</h1>
  <p class="muted">
    This page has been consolidated into <strong>Synonyms Workspace</strong>.
    Product aliases are managed in the vendor context to prevent mis-linking.
  </p>

  <div class="card" style="padding:12px; margin-top:12px;">
    <h2 style="margin:0 0 10px 0;">Go to workspace</h2>

    <div class="actions" style="gap:10px; flex-wrap:wrap;">
      <a class="btn btn-primary" th:href="@{/admin/synonyms/vendors(tab='products')}">
        Open Product Aliases (scoped)
      </a>
      <a class="btn btn-ghost" th:href="@{/admin/synonyms/vendors(tab='vendors')}">
        Open Vendor Aliases
      </a>
    </div>

    <div class="muted text-12 mt-8">
      Tip: Pick a canonical vendor first, then add product aliases inside that vendor.
    </div>
  </div>

</main>
</body>
</html>
