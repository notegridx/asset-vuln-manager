<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('CSV Import')}"></head>
<body th:replace="~{layout/base :: layout('CSV Import', 'admin', ~{::main})}">
<main>
  <div class="page-header">
    <h1>CSV Import (Staged)</h1>
    <div class="muted mt-6">Upload → Preview → Import</div>
  </div>

  <div class="grid gap-16">
    <section class="card p-16">
      <h2>Upload Assets CSV</h2>
      <form th:action="@{/admin/import/csv/assets/stage}" method="post" enctype="multipart/form-data" class="mt-10">
        <input type="file" name="file" accept=".csv" required>
        <button class="btn btn-primary" type="submit">Upload &amp; Preview</button>
      </form>
      <div class="muted mt-10">
        Required headers: <code>external_key</code>, <code>name</code>
      </div>
    </section>

    <section class="card p-16">
      <h2>Upload Software CSV</h2>
      <form th:action="@{/admin/import/csv/software/stage}" method="post" enctype="multipart/form-data" class="mt-10">
        <input type="file" name="file" accept=".csv" required>
        <button class="btn btn-primary" type="submit">Upload &amp; Preview</button>
      </form>
      <div class="muted mt-10">
        Required headers: <code>external_key</code>, <code>product</code><br>
        Note: asset must exist (import assets first)
      </div>
    </section>
  </div>
</main>
</body>
</html>
