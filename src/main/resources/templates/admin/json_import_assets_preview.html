<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('JSON Import - Assets Preview')}"></head>

<body th:replace="~{layout/base :: layout('JSON Import - Assets Preview', 'admin', ~{::main})}">
<main>

  <div class="actions" style="justify-content:space-between; align-items:flex-end; gap:12px; flex-wrap:wrap;">
    <div>
      <h1 style="margin:0;">Assets Preview</h1>
      <div class="muted" style="font-size:12px; margin-top:6px;">
        runId=<span th:text="${run.id}">0</span> /
        status=<span th:text="${run.status}">STAGED</span> /
        total=<span th:text="${run.totalRows}">0</span> /
        valid=<span th:text="${run.validRows}">0</span> /
        invalid=<span th:text="${run.invalidRows}">0</span>
      </div>
      <div class="muted" style="font-size:12px; margin-top:4px;">
        file=<span th:text="${run.originalFilename}">assets.json</span> /
        sha256=<span th:text="${run.sha256}">...</span>
      </div>
    </div>

    <div class="actions" style="margin:0;">
      <a class="btn" th:href="@{/admin/import/json}">Back</a>
      <form th:if="${run.validRows > 0}" th:action="@{/admin/import/json/assets/{runId}/import(runId=${run.id})}" method="post">
        <button class="btn btn-primary" type="submit"
                onclick="return confirm('Import valid rows? This will upsert assets and update last_seen_at.');">
          Import Assets (Upsert)
        </button>
      </form>
    </div>
  </div>

  <div class="card" style="padding:12px; margin:12px 0;">
    <div class="muted" style="font-size:12px; line-height:1.6;">
      Validation rules:
      <ul style="margin:6px 0 0 18px;">
        <li><b>externalKey</b> required</li>
        <li><b>name</b> required</li>
      </ul>
    </div>
  </div>

  <div class="table-wrap" style="margin-top:12px;">
    <table>
      <thead>
      <tr>
        <th style="width:60px;">#</th>
        <th style="width:120px;">Valid</th>
        <th style="width:220px;">externalKey</th>
        <th style="width:220px;">name</th>
        <th style="width:140px;">assetType</th>
        <th style="width:160px;">owner</th>
        <th>error</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="r : ${rows}">
        <td th:text="${r.rowNo}">1</td>
        <td>
          <span th:if="${r.valid}" class="badge badge--ok">OK</span>
          <span th:unless="${r.valid}" class="badge badge--danger">INVALID</span>
        </td>
        <td th:text="${r.externalKey}">k</td>
        <td th:text="${r.name}">n</td>
        <td th:text="${r.assetType}">t</td>
        <td th:text="${r.owner}">o</td>
        <td class="muted" th:text="${r.validationError}">-</td>
      </tr>
      </tbody>
    </table>
  </div>

</main>
</body>
</html>
