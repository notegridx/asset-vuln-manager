<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('Import History')}"></head>

<body th:replace="~{layout/base :: layout('Import History', 'admin', ~{::main})}">
<main>

  <h1>Import History</h1>
  <p class="muted">
    History of inventory imports (CSV / osquery / etc.). Use this to verify idempotency, throughput, and unresolved queue growth.
  </p>

  <div class="card">
    <div class="table-wrap">
      <table class="table">
        <thead>
        <tr>
          <th style="width:80px;">ID</th>
          <th style="width:110px;">Source</th>
          <th style="width:140px;">Kind</th>
          <th style="width:190px;">Started</th>
          <th style="width:190px;">Finished</th>
          <th style="width:120px; text-align:right;">Assets</th>
          <th style="width:120px; text-align:right;">Software</th>
          <th style="width:140px; text-align:right;">Unresolved</th>
          <th style="width:110px; text-align:right;">Errors</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${runs == null || #lists.isEmpty(runs)}">
          <td colspan="9" class="muted" style="padding:14px;">No import runs yet.</td>
        </tr>

        <tr th:each="r : ${runs}">
          <td>
            <span class="mono" th:text="${r.id}">1</span>
          </td>
          <td>
            <span class="badge" th:text="${r.source}">CSV</span>
          </td>
          <td>
            <span class="mono" th:text="${r.kind}">CSV_SOFTWARE</span>
          </td>
          <td class="mono"
              th:text="${T(dev.notegridx.security.assetvulnmanager.utility.UiDateTime).shortFormat(r.startedAt)}">
            2026-02-23 10:00
          </td>
          <td class="mono"
              th:text="${T(dev.notegridx.security.assetvulnmanager.utility.UiDateTime).shortFormat(r.finishedAt)}">
            2026-02-23 10:01
          </td>

          <td class="mono" style="text-align:right;" th:text="${r.assetsUpserted}">0</td>
          <td class="mono" style="text-align:right;" th:text="${r.softwareUpserted}">0</td>

          <td class="mono" style="text-align:right;">
              <span th:if="${r.unresolvedCount != null && r.unresolvedCount > 0}">
                <a th:href="@{/admin/unresolved(runId=${r.id})}" th:text="${r.unresolvedCount}">0</a>
              </span>
            <span th:if="${r.unresolvedCount == null || r.unresolvedCount == 0}" th:text="${r.unresolvedCount}">0</span>
          </td>

          <td class="mono" style="text-align:right;">
              <span th:classappend="${r.errorCount != null && r.errorCount > 0} ? ' badge badge-warn' : ''"
                    th:text="${r.errorCount}">0</span>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>
</body>
</html>
