<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('Edit Software')}"></head>

<body th:replace="~{layout/base :: layout('Edit Software', 'assets', ~{::main})}">
  <main>
    <div class="actions">
      <h1 style="margin: 0;">Edit Software</h1>
      <a th:href="@{/assets/{id}(id=${assetId})}"><- Back</a>
    </div>

    <p class="muted">
      SoftwareInstall ID: <b th:text="${softwareId}">1</b>
    </p>

    <form th:action="@{/software/{id}/edit(id=${softwareId})}" th:object="${softwareInstallForm}" method="post">

    <div class="field">
      <label>Vendor</label>
      <input type="text" th:field="*{vendor}" placeholder="e.g. microsoft"/>
      <div class="error" th:if="${#fields.hasErrors('vendor')}" th:errors="*{vendor}">Vendor error</div>
    </div>

    <div class="field">
      <label>Product *</label>
      <input type="text" th:field="*{product}" placeholder="e.g. edge" />
      <div class="error" th:if="${#fields.hasErrors('product')}" th:errors="*{product}">Product error</div>
    </div>

    <div class="field">
      <label>Version</label>
      <input type="text" th:field="*{version}" placeholder="e.g. 120.0.2210.61" />
      <div class="error" th:if="${#fields.hasErrors('version')}" th:errors="*{version}">Version error</div>
    </div>

    <div class="field">
      <label>CPE (cpeName)</label>
      <input type="text" th:field="*{cpeName}" placeholder="cpe:2.3:a:vendor:product:version:*:*:*:*:*:*:*" />
      <div class="error" th:if="${#fields.hasErrors('cpeName')}" th:errors="*{cpeName}">CPE error</div>
      <p class="muted" style="margin: 8px 0 0;">
        After updating the CPE, please re-synchronize via Admin Sync as needed (Match → Alert upsert).
      </p>
    </div>

    <div class="actions" style="margin-top: 14px;">
      <button type="submit">Save</button>
      <a th:href="@{/assets/{id}(id=${assetId})}">Cancel</a>
      <a th:href="@{/admin/sync}">Go to Admin Sync</a>

    </div>

    </div>
    </form>
  </main>
</body>

</html>
