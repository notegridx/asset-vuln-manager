<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('Edit Software')}"></head>

<body th:replace="~{layout/base :: layout('Edit Software', 'assets', ~{::main})}">
<main>
  <div class="actions">
    <h1 style="margin:0;">Edit Software</h1>
  </div>

  <p class="muted">
    <span>SoftwareInstall ID: </span><b th:text="${softwareId}">1</b>
  </p>

  <div class="muted" th:if="${demoMode}" style="margin:10px 0 14px 0;">
    Read only in demo mode. Changes are disabled.
  </div>

  <form th:action="@{/software/{id}/edit(id=${softwareId})}"
        th:object="${softwareInstallForm}"
        method="post">

    <div th:if="${#fields.hasGlobalErrors()}" class="card" style="padding:12px; margin:12px 0;">
      <div class="error" th:each="err : ${#fields.globalErrors()}" th:text="${err}">
        Error
      </div>
    </div>

    <div class="field">
      <label>Type</label>
      <select th:field="*{type}" th:disabled="${demoMode}">
        <option value="">APPLICATION</option>
        <option value="APPLICATION">APPLICATION</option>
        <option value="OPERATING_SYSTEM">OPERATING_SYSTEM</option>
      </select>
    </div>

    <div class="field">
      <label>Source</label>
      <input type="text" th:field="*{source}" placeholder="e.g. MANUAL / JSON_UPLOAD / CSV_UPLOAD" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Source Type</label>
      <input type="text" th:field="*{sourceType}" placeholder="e.g. OSQUERY_PROGRAMS / JSON_UPLOAD / WINGET" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Vendor</label>
      <input id="vendor"
             type="text"
             th:field="*{vendor}"
             placeholder="e.g. microsoft"
             autocomplete="off"
             th:disabled="${demoMode}">
      <input type="hidden" id="cpeVendorId" th:field="*{cpeVendorId}">
      <div id="vendorSelected"
           class="muted"
           style="margin-top:6px;"
           th:text="*{cpeVendorId} != null ? 'Selected canonical vendor ID: ' + *{cpeVendorId} : 'No canonical vendor selected.'">
        No canonical vendor selected.
      </div>
      <div id="vendorSuggest"
           class="card"
           style="display:none; margin-top:8px; padding:10px;"></div>
      <div class="error" th:if="${#fields.hasErrors('vendor')}" th:errors="*{vendor}">Vendor error</div>
      <div class="error" th:if="${#fields.hasErrors('cpeVendorId')}" th:errors="*{cpeVendorId}">Vendor ID error</div>
    </div>

    <div class="field">
      <label>Product *</label>
      <input id="product"
             type="text"
             th:field="*{product}"
             placeholder="e.g. edge"
             autocomplete="off"
             th:disabled="${demoMode}">
      <input type="hidden" id="cpeProductId" th:field="*{cpeProductId}">
      <div id="productSelected"
           class="muted"
           style="margin-top:6px;"
           th:text="*{cpeProductId} != null ? 'Selected canonical product ID: ' + *{cpeProductId} : 'No canonical product selected.'">
        No canonical product selected.
      </div>
      <div id="productSuggest"
           class="card"
           style="display:none; margin-top:8px; padding:10px;"></div>
      <div class="error" th:if="${#fields.hasErrors('product')}" th:errors="*{product}">Product error</div>
      <div class="error" th:if="${#fields.hasErrors('cpeProductId')}" th:errors="*{cpeProductId}">Product ID error</div>
    </div>

    <div class="field">
      <label>Version</label>
      <input type="text" th:field="*{version}" placeholder="e.g. 120.0.2210.61" th:disabled="${demoMode}">
      <div class="error" th:if="${#fields.hasErrors('version')}" th:errors="*{version}">Version error</div>
    </div>

    <div class="field">
      <label>CPE (cpeName)</label>
      <input type="text" th:field="*{cpeName}" placeholder="cpe:2.3:a:vendor:product:version:*:*:*:*:*:*:*" th:disabled="${demoMode}">
      <div class="error" th:if="${#fields.hasErrors('cpeName')}" th:errors="*{cpeName}">CPE error</div>
    </div>

    <div class="field">
      <label>Vendor Raw</label>
      <input type="text" th:field="*{vendorRaw}" placeholder="raw vendor from inventory source" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Product Raw</label>
      <input type="text" th:field="*{productRaw}" placeholder="raw product from inventory source" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Version Raw</label>
      <input type="text" th:field="*{versionRaw}" placeholder="raw version from inventory source" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Last Seen At</label>
      <input type="datetime-local" th:field="*{lastSeenAt}" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Installed At</label>
      <input type="datetime-local" th:field="*{installedAt}" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Install Location</label>
      <input type="text" th:field="*{installLocation}" placeholder="e.g. C:\Program Files\App" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Package Identifier</label>
      <input type="text" th:field="*{packageIdentifier}" placeholder="e.g. com.microsoft.Edge" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Architecture</label>
      <input type="text" th:field="*{arch}" placeholder="e.g. x64 / arm64" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Publisher</label>
      <input type="text" th:field="*{publisher}" placeholder="e.g. Microsoft Corporation" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Bundle ID</label>
      <input type="text" th:field="*{bundleId}" placeholder="e.g. com.apple.Safari" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Package Manager</label>
      <input type="text" th:field="*{packageManager}" placeholder="e.g. winget / brew / apt" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Install Source</label>
      <input type="text" th:field="*{installSource}" placeholder="e.g. STORE / MSI / PKG" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Edition</label>
      <input type="text" th:field="*{edition}" placeholder="e.g. Professional" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Channel</label>
      <input type="text" th:field="*{channel}" placeholder="e.g. stable / beta / dev" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>Release</label>
      <input type="text" th:field="*{release}" placeholder="e.g. 24H2" th:disabled="${demoMode}">
    </div>

    <div class="field">
      <label>PURL</label>
      <input type="text" th:field="*{purl}" placeholder="pkg:..." th:disabled="${demoMode}">
    </div>

    <div class="actions" style="margin-top:14px;">
      <a class="btn btn-ghost" th:href="@{/assets/{id}(id=${assetId})}">Cancel</a>
      <button type="submit" class="btn btn-primary" th:disabled="${demoMode}">Save</button>
    </div>

    <script th:inline="javascript">
      (function () {
          const demoMode = /*[[${demoMode}]]*/ false;
          if (demoMode) {
              return;
          }

          const vendorEl = document.getElementById('vendor');
          const productEl = document.getElementById('product');

          const cpeVendorIdEl = document.getElementById('cpeVendorId');
          const cpeProductIdEl = document.getElementById('cpeProductId');

          const vendorSuggestEl = document.getElementById('vendorSuggest');
          const productSuggestEl = document.getElementById('productSuggest');

          const vendorSelectedEl = document.getElementById('vendorSelected');
          const productSelectedEl = document.getElementById('productSelected');

          if (!vendorEl || !productEl || !cpeVendorIdEl || !cpeProductIdEl
              || !vendorSuggestEl || !productSuggestEl
              || !vendorSelectedEl || !productSelectedEl) {
              return;
          }

          function debounce(fn, wait) {
              let t = null;
              return function (...args) {
                  clearTimeout(t);
                  t = setTimeout(() => fn.apply(this, args), wait);
              };
          }

          async function fetchGrouped(url) {
              try {
                  const res = await fetch(url, {
                      headers: { 'Accept': 'application/json' }
                  });
                  if (!res.ok) return { exact: [], others: [] };

                  const data = await res.json();
                  return {
                      exact: Array.isArray(data?.exact) ? data.exact : [],
                      others: Array.isArray(data?.others) ? data.others : []
                  };
              } catch (e) {
                  return { exact: [], others: [] };
              }
          }

          function escapeHtml(value) {
              return String(value ?? '')
                  .replaceAll('&', '&amp;')
                  .replaceAll('<', '&lt;')
                  .replaceAll('>', '&gt;')
                  .replaceAll('"', '&quot;')
                  .replaceAll("'", '&#39;');
          }

          function setSelectedText(targetEl, prefix, idValue) {
              if (idValue && String(idValue).trim() !== '') {
                  targetEl.textContent = prefix + idValue;
              } else if (targetEl === vendorSelectedEl) {
                  targetEl.textContent = 'No canonical vendor selected.';
              } else {
                  targetEl.textContent = 'No canonical product selected.';
              }
          }

          function clearVendorSelection() {
              cpeVendorIdEl.value = '';
              setSelectedText(vendorSelectedEl, 'Selected canonical vendor ID: ', '');
          }

          function clearProductSelection() {
              cpeProductIdEl.value = '';
              setSelectedText(productSelectedEl, 'Selected canonical product ID: ', '');
          }

          function flattenGrouped(data) {
              const exact = Array.isArray(data?.exact) ? data.exact : [];
              const others = Array.isArray(data?.others) ? data.others : [];
              return [...exact, ...others];
          }

          function renderVendorSuggestions(data) {
              const items = flattenGrouped(data);

              if (items.length === 0) {
                  vendorSuggestEl.style.display = 'none';
                  vendorSuggestEl.innerHTML = '';
                  return;
              }

              vendorSuggestEl.innerHTML = items.map(item => {
                  const id = escapeHtml(item.id ?? '');
                  const label = escapeHtml(item.label ?? '');
                  const nameNorm = escapeHtml(item.nameNorm ?? '');
                  const text = label || nameNorm;
                  return `
                    <button type="button"
                            class="btn btn-ghost btn-sm"
                            data-id="${id}"
                            data-label="${label}"
                            data-name-norm="${nameNorm}"
                            style="margin:4px 6px 4px 0;">
                      ${escapeHtml(text)}
                    </button>
                  `;
              }).join('');

              vendorSuggestEl.style.display = 'block';

              vendorSuggestEl.querySelectorAll('button[data-id]').forEach(btn => {
                  btn.addEventListener('click', function () {
                      vendorEl.value = this.dataset.label || this.dataset.nameNorm || '';
                      cpeVendorIdEl.value = this.dataset.id || '';
                      setSelectedText(vendorSelectedEl, 'Selected canonical vendor ID: ', cpeVendorIdEl.value);

                      productEl.value = '';
                      clearProductSelection();
                      productSuggestEl.style.display = 'none';
                      productSuggestEl.innerHTML = '';

                      vendorSuggestEl.style.display = 'none';
                  });
              });
          }

          function renderProductSuggestions(data) {
              const items = flattenGrouped(data);

              if (items.length === 0) {
                  productSuggestEl.style.display = 'none';
                  productSuggestEl.innerHTML = '';
                  return;
              }

              productSuggestEl.innerHTML = items.map(item => {
                  const id = escapeHtml(item.id ?? '');
                  const label = escapeHtml(item.label ?? '');
                  const nameNorm = escapeHtml(item.nameNorm ?? '');
                  const text = label || nameNorm;
                  return `
                    <button type="button"
                            class="btn btn-ghost btn-sm"
                            data-id="${id}"
                            data-label="${label}"
                            data-name-norm="${nameNorm}"
                            style="margin:4px 6px 4px 0;">
                      ${escapeHtml(text)}
                    </button>
                  `;
              }).join('');

              productSuggestEl.style.display = 'block';

              productSuggestEl.querySelectorAll('button[data-id]').forEach(btn => {
                  btn.addEventListener('click', function () {
                      productEl.value = this.dataset.label || this.dataset.nameNorm || '';
                      cpeProductIdEl.value = this.dataset.id || '';
                      setSelectedText(productSelectedEl, 'Selected canonical product ID: ', cpeProductIdEl.value);
                      productSuggestEl.style.display = 'none';
                  });
              });
          }

          const updateVendors = debounce(async () => {
              const q = (vendorEl.value || '').trim();

              if (q.length < 2) {
                  vendorSuggestEl.style.display = 'none';
                  vendorSuggestEl.innerHTML = '';
                  return;
              }

              const data = await fetchGrouped('/api/dict/vendors/search2?q=' + encodeURIComponent(q));
              renderVendorSuggestions(data);
          }, 200);

          const updateProducts = debounce(async () => {
              const vendorId = (cpeVendorIdEl.value || '').trim();
              const q = (productEl.value || '').trim();

              if (!vendorId || q.length < 2) {
                  productSuggestEl.style.display = 'none';
                  productSuggestEl.innerHTML = '';
                  return;
              }

              const data = await fetchGrouped(
                  '/api/dict/products/search2?vendorId=' + encodeURIComponent(vendorId) + '&q=' + encodeURIComponent(q)
              );
              renderProductSuggestions(data);
          }, 200);

          vendorEl.addEventListener('input', function () {
              clearVendorSelection();
              productEl.value = '';
              clearProductSelection();
              productSuggestEl.style.display = 'none';
              productSuggestEl.innerHTML = '';
              updateVendors();
          });

          productEl.addEventListener('input', function () {
              clearProductSelection();
              updateProducts();
          });

          setSelectedText(vendorSelectedEl, 'Selected canonical vendor ID: ', cpeVendorIdEl.value);
          setSelectedText(productSelectedEl, 'Selected canonical product ID: ', cpeProductIdEl.value);
      })();
    </script>

  </form>
</main>
</body>
</html>
