<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('Installed Software')}"></head>

<body th:replace="~{layout/base :: layout('Installed Software', 'assets', ~{::main})}">
<main>

  <div class="actions">
    <h1 style="margin:0;">Installed Software</h1>
    <a class="btn" th:href="@{/software}">Clear</a>
  </div>

  <!-- Controls: same card style as alerts/vulns -->
  <div class="card" style="padding:12px; margin:12px 0;">
    <form method="get" th:action="@{/software}"
          style="display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end;">

      <div class="field" style="min-width:320px; margin:0;">
        <label>Search (vendor / product / version)</label>
        <input type="text" name="q" th:value="${q}" placeholder="e.g. openssl, apache, 2.4.58"/>
      </div>

      <div class="field" style="min-width:240px; margin:0;">
        <label>Asset</label>
        <select name="assetId">
          <option value="" th:selected="${assetId == null}">All assets</option>
          <option th:each="a : ${assets}"
                  th:value="${a.id}"
                  th:selected="${assetId != null and a.id == assetId}"
                  th:text="${a.name}">AssetName</option>
        </select>
      </div>

      <div class="field" style="min-width:220px; margin:0;">
        <label>CPE mapping</label>
        <select name="unmappedCpe">
          <option value="" th:selected="${unmappedCpe == null}">All</option>
          <option value="true" th:selected="${unmappedCpe != null and unmappedCpe == true}">UNMAPPED only</option>
          <option value="false" th:selected="${unmappedCpe != null and unmappedCpe == false}">MAPPED only</option>
        </select>
      </div>

      <div class="actions" style="margin:0 0 0 auto;">
        <button class="btn" type="submit">Apply</button>
      </div>

      <!-- keep page size -->
      <input type="hidden" name="size" th:value="${page.size}"/>
    </form>

    <p class="muted" style="margin:10px 0 0;">
      Total installs: <b th:text="${totalInstalls}">0</b>
      / Unmapped (CPE): <b th:text="${unmappedCount}">0</b>
    </p>
  </div>

  <!-- Table: use table-wrap like alerts/vulns -->
  <div class="card p-0 overflow-auto">
    <div class="table-wrap table--fixed">
      <table class="table m-0">
      <thead>
      <tr>
        <th style="width:72px;">ID</th>
        <th>Vendor</th>
        <th>Product</th>
        <th>Version</th>
        <th>CPE</th>
        <th>Asset</th>
        <th style="width: 160px;">Actions</th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="s : ${page.content}">
        <td th:text="${s.id}">1</td>

        <td th:text="${s.vendor}">vendor</td>
        <td class="cell-break">
          <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
            <a th:href="@{/software/{id}(id=${s.id})}">
              <b th:text="${s.product}">product</b>
            </a>

            <a th:if="${alertCountMap[s.id] != null and alertCountMap[s.id] > 0}"
               class="badge"
               th:href="@{/alerts(view='FLAT', status='OPEN', softwareId=${s.id})}">
              <span th:text="${alertCountMap[s.id]}">0</span> alerts
            </a>

          </div>
        </td>
        <td th:text="${s.version}">version</td>

        <td class="cell-break">
          <span th:if="${s.cpeName == null or #strings.trim(s.cpeName) == ''}" class="badge badge--warn">UNMAPPED</span>
          <span th:unless="${s.cpeName == null or #strings.trim(s.cpeName) == ''}"
                class="mono" th:text="${s.cpeName}">cpe:2.3:...</span>
        </td>

        <td>
          <a th:href="@{/assets/{id}(id=${s.asset.id})}" th:text="${s.asset.name}">AssetName</a>
        </td>

        <td>
          <div class="actions" style="margin:0; justify-content:flex-start; gap:6px; flex-wrap:wrap;">
            <a class="btn btn--small" th:href="@{/software/{id}/edit(id=${s.id})}">Edit</a>

            <form th:action="@{/software/{id}/delete(id=${s.id})}" method="post"
                  style="display:inline;"
                  onsubmit="return confirm('Delete this software install? Related alerts will also be deleted.');">
              <input type="hidden" name="assetId" th:value="${s.asset.id}">
              <input type="hidden" name="returnTo" value="software">
              <button class="btn btn--small btn--danger" type="submit">Delete</button>
            </form>
          </div>
        </td>
      </tr>

      <tr th:if="${page.totalElements == 0}">
        <td colspan="7" class="muted" style="padding:14px;">No software installs found.</td>
      </tr>
      </tbody>
    </table>
  </div>
  </div>

  <!-- pager -->
  <div class="actions" style="justify-content:space-between;">
    <div class="muted">
      Page <b th:text="${page.number + 1}">1</b> / <b th:text="${page.totalPages}">1</b>
      (rows: <b th:text="${page.totalElements}">0</b>)
    </div>

    <div style="display:flex; gap:8px; align-items:center;">
      <a class="btn btn--small"
         th:classappend="${page.first} ? ' btn--disabled' : ''"
         th:href="@{/software(page=${page.number - 1}, size=${page.size}, assetId=${assetId}, q=${q}, unmappedCpe=${unmappedCpe})}">
        Prev
      </a>

      <a class="btn btn--small"
         th:classappend="${page.last} ? ' btn--disabled' : ''"
         th:href="@{/software(page=${page.number + 1}, size=${page.size}, assetId=${assetId}, q=${q}, unmappedCpe=${unmappedCpe})}">
        Next
      </a>
    </div>
  </div>

</main>
</body>
</html>
