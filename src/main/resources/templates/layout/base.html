<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/styles.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title th:text="${title}">asset-vuln-manager</title>
</head>

<body th:fragment="layout(title, active, content)">
<div class="container">

  <header>
    <div class="brand">
      <a class="brand-link" th:href="@{/dashboard}">
  <span class="brand-mark" aria-hidden="true">
    <svg viewBox="0 0 24 24" class="brand-icon">
      <circle cx="6" cy="6" r="2" />
      <circle cx="18" cy="6" r="2" />
      <circle cx="12" cy="18" r="2" />
      <line x1="6" y1="6" x2="18" y2="6" />
      <line x1="6" y1="6" x2="12" y2="18" />
      <line x1="18" y1="6" x2="12" y2="18" />
    </svg>
  </span>

        <span class="title">asset-vuln-manager</span>
        <span class="brand-hint">← Back to Dashboard</span>
      </a>

      <div class="sub" th:text="${title}">Vulnerabilities</div>
    </div>

    <div th:replace="~{fragments/nav :: nav(${active})}"></div>
  </header>

  <div th:if="${demoMode}"
       style="margin:12px 0 0 0; padding:10px 12px; border:1px solid rgba(255,180,80,.35); border-radius:10px; background:rgba(255,180,80,.12); color:#ffd08a;">
    <b>⚠ Demo mode</b>
    <span style="margin-left:8px;">Changes are disabled in this public demo.</span>
  </div>

  <div th:replace="${content}"></div>

  <footer></footer>
</div>

<div id="demo-toast"
     style="position:fixed; right:16px; bottom:16px; z-index:9999; max-width:360px; display:none; padding:12px 14px; border-radius:10px; border:1px solid rgba(255,180,80,.35); background:rgba(24,24,24,.96); color:#ffd08a; box-shadow:0 10px 30px rgba(0,0,0,.35);">
  <div id="demo-toast-message">This public demo is read-only.</div>
</div>

<script>
  (function () {
    function showDemoToast(message) {
      var toast = document.getElementById('demo-toast');
      var msg = document.getElementById('demo-toast-message');
      if (!toast || !msg) return;

      msg.textContent = message || 'This public demo is read-only.';
      toast.style.display = 'block';

      clearTimeout(showDemoToast._timer);
      showDemoToast._timer = setTimeout(function () {
        toast.style.display = 'none';
      }, 3200);
    }

    window.showDemoToast = showDemoToast;

    // Close open NAV dropdowns when clicking outside
    document.addEventListener('click', function (e) {
      if (e.target.closest('details.nav-admin')) return;
      document.querySelectorAll('details.nav-admin[open]').forEach(function (d) {
        d.removeAttribute('open');
      });
    });

    // Close NAV dropdowns on Escape
    document.addEventListener('keydown', function (e) {
      if (e.key !== 'Escape') return;
      document.querySelectorAll('details.nav-admin[open]').forEach(function (d) {
        d.removeAttribute('open');
      });
    });

    // Keep only one NAV dropdown open at a time
    document.addEventListener('toggle', function (e) {
      var d = e.target;
      if (!(d instanceof HTMLDetailsElement)) return;
      if (!d.open) return;
      if (!d.classList.contains('nav-admin')) return;

      document.querySelectorAll('details.nav-admin[open]').forEach(function (other) {
        if (other !== d) other.removeAttribute('open');
      });
    }, true);

    // HTMX-triggered demo error
    document.body.addEventListener('demoError', function (e) {
      var message = e && e.detail && e.detail.message
              ? e.detail.message
              : 'This public demo is read-only.';
      showDemoToast(message);
    });
  })();
</script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
</body>
</html>
