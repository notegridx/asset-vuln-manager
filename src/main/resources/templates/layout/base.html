<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title}">asset-vuln-manager</title>

  <style>
    :root {
      --bg: #0b0d12;
      --panel: #121826;
      --text: #e6e8ee;
      --muted: #a6adbb;
      --line: #2a3550;
      --accent: #8ab4ff;

      /* subtle semantic accents (keep the same design language) */
      --ok: #8ab4ff;      /* reuse accent */
      --warn: #ffd37a;
      --danger: #ff9aa5;
      --neutral: #a6adbb; /* muted */

      /* ===== B2B UI rhythm ===== */
      --space-1: 8px;
      --space-2: 12px;
      --space-3: 16px;
      --space-4: 20px;
      --space-5: 28px;

      --radius-1: 12px;
      --radius-2: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background:
              radial-gradient(1200px 700px at 20% -10%, rgba(138, 180, 255, 0.12), transparent 40%),
              radial-gradient(900px 600px at 90% 0%, rgba(255, 211, 122, 0.08), transparent 42%),
              var(--bg);
      color: var(--text);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-2);
      background: rgba(18, 24, 38, 0.75);
      backdrop-filter: blur(6px);
      position: relative;
      z-index: 1000; /* dropdown in front of main */
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      line-height: 1;
    }

    .brand .title {
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .brand .sub {
      color: var(--muted);
      font-size: 12px;
    }

    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--radius-1);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      background: rgba(255, 255, 255, 0.02);
    }

    .nav-link:hover {
      border-color: rgba(138, 180, 255, 0.35);
      color: var(--text);
      text-decoration: none;
    }

    .nav-link.active {
      border-color: rgba(138, 180, 255, 0.55);
      color: var(--text);
      background: rgba(138, 180, 255, 0.10);
    }

    main {
      margin-top: 16px;
      padding: 16px;
      border-radius: var(--radius-2);
      border: 1px solid var(--line);
      background: rgba(18, 24, 38, 0.65);
      backdrop-filter: blur(6px);
      position: relative;
      z-index: 1;

      /* ===== Stable layout (prevents "table jumps") ===== */
      min-height: 72vh;
    }

    h1,
    h2,
    h3 {
      margin: 0 0 12px;
    }

    .muted {
      color: var(--muted);
    }

    /* ===== B2B Page scaffold ===== */
    .page {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    /* Title + summary + primary actions (fixed height) */
    .page-header {
      min-height: 72px; /* 핵: prevents vertical shifts across pages */
      display: flex;
      gap: var(--space-3);
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .page-title h1 {
      margin: 0;
    }

    .page-title .sub {
      margin-top: 6px;
    }

    .kpi {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* Toolbar: filters/search/sort area */
    .toolbar {
      border: 1px solid var(--line);
      border-radius: var(--radius-2);
      background: rgba(255, 255, 255, 0.02);
      padding: 12px;
    }

    .toolbar .form-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    /* Generic actions row (keep existing behavior) */
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    /* Optional: consistent separators */
    hr {
      border: none;
      border-top: 1px solid rgba(42, 53, 80, 0.65);
      margin: 16px 0;
      opacity: 0.9;
    }

    /* ===== Table wrapper ensures stable start + min height ===== */
    .table-wrap {
      min-height: 420px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-spacing: 0;
      margin-top: 10px;
      overflow: hidden;
      border-radius: var(--radius-1);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.01);
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(42, 53, 80, 0.7);
      vertical-align: top;
      font-size: 14px;
      line-height: 1.35;
    }

    thead th {
      text-align: left;
      color: var(--muted);
      font-weight: 600;
      background: rgba(255, 255, 255, 0.02);

      /* ===== Sticky header for B2B tables ===== */
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(6px);
      background: rgba(18, 24, 38, 0.95);
    }

    tbody tr:hover {
      background: rgba(138, 180, 255, 0.06);
    }

    tr:last-child td {
      border-bottom: none;
    }

    /* Small metadata text inside cells */
    td .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    .field {
      display: grid;
      gap: 6px;
      margin: 12px 0;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
    }

    .field input,
    .field select,
    .field textarea {
      padding: 10px 12px;
      border-radius: var(--radius-1);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      outline: none;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(138, 180, 255, 0.55);
    }

    /* ===== Buttons: Primary / Ghost / Danger ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius-1);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      user-select: none;
    }

    .btn:hover {
      border-color: rgba(138, 180, 255, 0.35);
      text-decoration: none;
    }

    .btn-primary {
      border-color: rgba(138, 180, 255, 0.55);
      background: rgba(138, 180, 255, 0.14);
    }

    .btn-primary:hover {
      background: rgba(138, 180, 255, 0.20);
    }

    .btn-ghost {
      background: transparent;
    }

    .btn-danger {
      border-color: rgba(255, 154, 165, 0.55);
      background: rgba(255, 154, 165, 0.10);
    }

    .btn-danger:hover {
      background: rgba(255, 154, 165, 0.14);
      border-color: rgba(255, 154, 165, 0.70);
    }

    /* Backward compatible: keep existing .btn look if pages use it */
    /* (If you prefer strict separation, remove these two lines) */
    .btn:not(.btn-primary):not(.btn-ghost):not(.btn-danger) {
      border-color: rgba(138, 180, 255, 0.55);
      background: rgba(138, 180, 255, 0.14);
    }
    .btn:not(.btn-primary):not(.btn-ghost):not(.btn-danger):hover {
      background: rgba(138, 180, 255, 0.20);
    }

    .pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    /* Badges: status / severity / unmapped */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 12px;
      line-height: 1.4;
      white-space: nowrap;
    }

    .badge--status-open {
      color: var(--text);
      border-color: rgba(138, 180, 255, 0.45);
      background: rgba(138, 180, 255, 0.10);
    }

    .badge--status-closed {
      color: var(--muted);
      background: rgba(166, 173, 187, 0.06);
    }

    .badge--sev-none {
      color: var(--muted);
      background: rgba(166, 173, 187, 0.06);
    }

    .badge--sev-low {
      color: var(--text);
      border-color: rgba(138, 180, 255, 0.40);
      background: rgba(138, 180, 255, 0.08);
    }

    .badge--sev-medium {
      color: var(--text);
      border-color: rgba(255, 211, 122, 0.45);
      background: rgba(255, 211, 122, 0.10);
    }

    .badge--sev-high,
    .badge--sev-critical {
      color: var(--text);
      border-color: rgba(255, 154, 165, 0.45);
      background: rgba(255, 154, 165, 0.10);
    }

    .badge--unmapped {
      color: var(--text);
      border-color: rgba(255, 211, 122, 0.45);
      background: rgba(255, 211, 122, 0.10);
    }

    /* KV display (used by asset detail etc.) */
    .kv {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 8px 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-2);
      background: rgba(255, 255, 255, 0.01);
    }

    .kv .k {
      color: var(--muted);
      font-size: 13px;
    }

    .kv .v {
      color: var(--text);
    }

    /* Generic card (used across templates) */
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius-2);
      background: rgba(255, 255, 255, 0.01);
    }

    /* Empty state utility */
    .empty-state {
      padding: 14px;
      border: 1px dashed rgba(42, 53, 80, 0.9);
      border-radius: var(--radius-2);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.01);
    }

    .vuln-desc {
      overflow-wrap: anywhere;   /* これが本命 */
      word-break: break-word;    /* 保険 */
    }

    footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      opacity: 0.85;
    }
  </style>

</head>

<body th:fragment="layout(title, active, content)">
<div class="container">
  <!-- 既存の header の <nav>...</nav> を、これに置き換え -->

  <header>
    <div class="brand">
      <div class="title">asset-vuln-manager</div>
      <div class="sub" th:text="${title}">page</div>
    </div>

    <div th:replace="~{fragments/nav :: nav(${active})}"></div>
  </header>

  <div th:replace="${content}"></div>

  <footer></footer>
</div>

<script>
  (function () {
    // Close any open <details> when clicking outside
    document.addEventListener('click', function (e) {
      // If the click is inside a <details>, do nothing
      if (e.target.closest('details')) return;

      // Otherwise close all open <details>
      document.querySelectorAll('details[open]').forEach(function (d) {
        d.removeAttribute('open');
      });
    });

    // Close on Escape key (nice UX)
    document.addEventListener('keydown', function (e) {
      if (e.key !== 'Escape') return;
      document.querySelectorAll('details[open]').forEach(function (d) {
        d.removeAttribute('open');
      });
    });

    // Optional: close other <details> when opening one (keeps nav tidy)
    document.addEventListener('toggle', function (e) {
      var d = e.target;
      if (!(d instanceof HTMLDetailsElement)) return;
      if (!d.open) return;

      document.querySelectorAll('details[open]').forEach(function (other) {
        if (other !== d) other.removeAttribute('open');
      });
    }, true);
  })();
</script>

</body>

</html>
