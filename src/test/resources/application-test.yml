spring:
  datasource:
    url: jdbc:h2:mem:assetvulnmanager-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

  h2:
    console:
      enabled: false

app:
  software:
    dict-mode: LENIENT

logging:
  level:
    root: warn
    org.hibernate.SQL: warn
    dev.notegridx.security.assetvulnmanager: warn